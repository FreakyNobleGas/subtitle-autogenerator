services:
  app:
    build: .
    image: generate-subtitles-app:latest
    deploy:
      resources:
        limits:
          cpus: "1.0"
    environment:
      MEDIA_DIR: /media
    volumes:
      - type: bind
        source: "${HOST_MEDIA_DIR:-/media}"
        target: /media
      - whisper-cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  whisper-cache:
